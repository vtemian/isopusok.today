name = "isopusok"
main = "src/worker.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat_v2"]

# Bind the D1 database. Create it once with:
#   wrangler d1 create isopusok
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "isopusok"
database_id = "6ee54cfc-3206-4369-84a6-55fea89714eb"
migrations_dir = "migrations"

[[routes]]
pattern = "isopusok.today"
custom_domain = true
