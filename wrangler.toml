name = "isopusok"
main = "src/worker.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# Bind the D1 database. Create it once with:
#   wrangler d1 create isopusok
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "isopusok"
database_id = "REPLACE_ME"
migrations_dir = "migrations"

# Custom domain. Add the route after first deploy via:
#   wrangler deploy   (then bind isopusok.today in the CF dashboard)
# or uncomment once the zone is ready:
# [[routes]]
# pattern = "isopusok.today"
# custom_domain = true
